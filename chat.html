<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - HopeSeed Support</title>
    <style>
        :root {
            --chat-bg: #7494c0;
            --my-bubble: #85e249;
            --other-bubble: #ffffff;
            --input-bg: #ffffff;
            --header-bg: #35495e;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }

        #chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: var(--chat-bg);
        }

        /* ヘッダー */
        header {
            background-color: var(--header-bg);
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        /* メッセージ表示エリア */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 共通の吹き出しスタイル */
        .message {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
        }

        /* 自分のメッセージ (右) */
        .message.mine {
            align-self: flex-end;
            background-color: var(--my-bubble);
            border-bottom-right-radius: 2px;
            color: #000;
        }

        /* 相手のメッセージ (左) */
        .message.other {
            align-self: flex-start;
            background-color: var(--other-bubble);
            border-bottom-left-radius: 2px;
            color: #000;
        }

        /* 入力エリア */
        #input-area {
            background-color: var(--input-bg);
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #ddd;
        }

        #message-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 16px;
        }

        #send-btn {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        #send-btn:hover {
            background-color: #45a049;
        }

        /* 既読・時間などの装飾は省略 */
    </style>
</head>
<body>

<div id="chat-container">
    <header>春風まとい 🌸</header>
    
    <div id="messages">
        <div class="message other">ヤッホー！春風まといだよ！🌸<br>HopeSeedっていうサイトについて調べてほしいんだけど、手伝ってくれるかな？</div>
    </div>

    <form id="input-area">
        <input type="text" id="message-input" placeholder="メッセージを入力..." autocomplete="off">
        <button type="submit" id="send-btn">送信</button>
    </form>
</div>

<script>
    const messagesContainer = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const inputArea = document.getElementById('input-area');

    function addMessage(text, type) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type}`;
        msgDiv.innerHTML = text.replace(/\n/g, '<br>');
        messagesContainer.appendChild(msgDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function handleResponse(userText) {
        let response = "";
        
        if (userText.includes("いいよ") || userText.includes("了解") || userText.includes("OK")) {
            response = "やったー！ありがとー！✨\n早速、サイトの中に怪しいところがないかチェックしてみて！";
        } else if (userText.includes("誰") || userText.includes("名前")) {
            response = "さっきも言ったけど、春風まといだよ！\n好奇心旺盛な17歳…ってことでよろしくね！😋";
        } else if (userText.includes("怪しい") || userText.includes("サイト") || userText.includes("HopeSeed")) {
            response = "なんだかあのサイト、不自然なプロジェクトが多い気がするんだよね…。\n特に一番上の『娘の夢』とか書いてあるやつ、ちょっと気にならない？";
        } else if (userText.includes("わかった") || userText.includes("任せて")) {
            response = "頼もしいなー！期待してるよ！\n何か見つけたらすぐ教えてね！待ってるから！";
        } else {
            response = "あはは、面白いこと言うね！\nそれより、HopeSeedの調査のほうはどうかな？";
        }

        setTimeout(() => {
            addMessage(response, 'other');
        }, 1200);
    }

    // 送信イベント
    inputArea.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = messageInput.value.trim();
        if (text === "") return;

        addMessage(text, 'mine');
        messageInput.value = "";

        handleResponse(text);
    });
</script>

</body>
</html>
