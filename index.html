<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HopeSeed - Chat with Matoi</title>
    <style>
        :root {
            --chat-bg: #7494c0;
            --my-bubble: #85e249;
            --other-bubble: #ffffff;
            --input-bg: #ffffff;
            --header-bg: #35495e;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }

        #chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: var(--chat-bg);
        }

        header {
            background-color: var(--header-bg);
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
        }

        .message.mine {
            align-self: flex-end;
            background-color: var(--my-bubble);
            border-bottom-right-radius: 2px;
            color: #000;
        }

        .message.other {
            align-self: flex-start;
            background-color: var(--other-bubble);
            border-bottom-left-radius: 2px;
            color: #000;
        }

        .message a {
            color: #1e88e5;
            text-decoration: underline;
        }

        #input-area {
            background-color: var(--input-bg);
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #ddd;
        }

        #message-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 16px;
        }

        #send-btn {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        #send-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <header>春風まとい 🌸</header>
    <div id="messages"></div>

    <form id="input-area">
        <input type="text" id="message-input" placeholder="メッセージを入力..." autocomplete="off">
        <button type="submit" id="send-btn">送信</button>
    </form>
</div>

<script>
    const messagesContainer = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const inputArea = document.getElementById('input-area');

    // セクションと履歴の管理
    let currentSection = parseInt(localStorage.getItem('matoiSection')) || 0;
    let chatHistory = JSON.parse(localStorage.getItem('matoiChatHistory')) || [];

    function saveSection(section) {
        currentSection = section;
        localStorage.setItem('matoiSection', section);
    }

    function addMessage(text, type, shouldSave = true) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type}`;
        msgDiv.innerHTML = text.replace(/\n/g, '<br>');
        messagesContainer.appendChild(msgDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;

        if (shouldSave) {
            chatHistory.push({ text, type });
            localStorage.setItem('matoiChatHistory', JSON.stringify(chatHistory));
        }
    }

    // 履歴の読み込み
    window.onload = () => {
        if (chatHistory.length > 0) {
            chatHistory.forEach(msg => addMessage(msg.text, msg.type, false));
        } else if (currentSection === 0) {
            // 履歴がなく、セクション0の場合のみ初期演出
            setTimeout(() => addMessage("……すみません、見えてますか？", "other"), 1000);
            setTimeout(() => addMessage("HopeSeedの調査を手伝ってくれる方ですよね！？", "other"), 2000);
            setTimeout(() => addMessage("見えてたら何か返信くれますか！？", "other"), 3000);
        }
    };

    function handleResponse(userText) {
        if (currentSection === 0) {
            saveSection(1);
            setTimeout(() => addMessage("私、春風まといって言います！", "other"), 1000);
            setTimeout(() => addMessage("もう聞いてるかもなんですが、とあるクラウドファンディングサイトの調査をしてほしくて！", "other"), 2000);
            setTimeout(() => addMessage("これサイトのURLです！！", "other"), 3000);
            setTimeout(() => addMessage('<a href="https://yuda-6666.github.io/arg-site/top.html" target="_blank">https://yuda-6666.github.io/arg-site/top.html</a>', "other"), 4000);
        } else {
            let response = "";
            if (userText.includes("誰") || userText.includes("名前")) {
                response = "春風まといだよ！好奇心旺盛な17歳😋\nサイトの調査、手伝ってくれて本当にありがとうね！";
            } else if (userText.includes("怪しい") || userText.includes("サイト") || userText.includes("HopeSeed")) {
                response = "あのサイト、絶対何か隠してると思うんだよね…。\n特に『娘の夢』のプロジェクト、支援者のコメント欄とかもチェックしてみて！";
            } else {
                response = "あはは、面白いこと言うね！✨\n何か不自然なところを見つけたら、すぐに教えてほしいな！";
            }
            setTimeout(() => addMessage(response, 'other'), 1000);
        }
    }

    inputArea.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = messageInput.value.trim();
        if (text === "") return;

        addMessage(text, 'mine');
        messageInput.value = "";
        handleResponse(text);
    });
</script>

</body>
</html>
